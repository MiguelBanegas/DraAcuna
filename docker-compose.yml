services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    ports:
      - "5173:5173"

    volumes:
      - .:/app
      - /app/node_modules

    

    depends_on:
      - api

    restart: unless-stopped
    
  api:
    build: 
      context: ./server
      dockerfile: Dockerfile

    working_dir: /app
    
    ports:
      - "3000:3000"
    environment:
      BACKUPS_DIR: /app/backups
    volumes:
      - ./backups:/app/backups

    restart: unless-stopped
  postgres:
    image: postgres:17
    restart: unless-stopped